<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --fg: #1a1a1a;
      --accent: #5e8460;
      --border: #1a1a1a;
      --border-faint: rgba(26,26,26,0.15);
      --muted: #888;
      --accent-faint: rgba(94,132,96,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #262624;
        --fg: #f0ece4;
        --accent: #8cc48e;
        --border: #f0ece4;
        --border-faint: rgba(240,236,228,0.15);
        --muted: #777;
        --accent-faint: rgba(140,196,142,0.1);
      }
    }

    [data-theme="dark"] {
      --bg: #262624;
      --fg: #f0ece4;
      --accent: #8cc48e;
      --border: #f0ece4;
      --border-faint: rgba(240,236,228,0.15);
      --muted: #777;
      --accent-faint: rgba(140,196,142,0.1);
      color-scheme: dark;
    }

    [data-theme="light"] {
      --bg: #f5f0e8;
      --fg: #1a1a1a;
      --accent: #5e8460;
      --border: #1a1a1a;
      --border-faint: rgba(26,26,26,0.15);
      --muted: #888;
      --accent-faint: rgba(94,132,96,0.08);
      color-scheme: light;
    }

    [data-theme="dark"] body, [data-theme="light"] body {
      background: var(--bg);
      color: var(--fg);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #root { width: 100%; display: flex; justify-content: center; }

    .shell {
      width: 100%;
      max-width: 600px;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 3rem;
    }

    .rule {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;

      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .prayer-name {
      font-family: 'Bebas Neue', sans-serif;

      line-height: 0.9;

    .prayer-time {

      font-family: 'Bebas Neue', sans-serif;

    .location-line {
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .location-controls {

      align-items: center;
      gap: 1rem;

    .change-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Courier Prime', monospace;

    .time-toggle {

      opacity: 0.45;
      transition: opacity 0.15s;
      cursor: pointer;
      min-height: 44px;

    .time-toggle:hover { opacity: 0.85; }

    .toggle-track {

      height: 14px;
      border: 1px solid var(--border);
      border-radius: 0;

    .toggle-thumb {

      left: 2px;

    .toggle-thumb.right {

    .toggle-label {

      font-size: 0.65rem;

    .loading-msg {

    .form-title {

    .city-input {

      padding: 0.7rem 1rem;

      display: flex;

      align-items: baseline;

    .prayer-row.active {

    .prayer-row-name {

    .prayer-row.active .prayer-row-name {

    .prayer-row-time {

    .prayer-row.active .prayer-row-time {

    .method-note {
      position: fixed;

      letter-spacing: 0.08em;

    /* ─── Display Mode ─────────────────────────────────────────────────────── */

    .display-mode-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;

      gap: 0.4rem;

    .display-mode-toggle:hover { opacity: 1; }

      display: flex;

    /* ─── Last Third Mode ───────────────────────────────────────────────────── */

    .last-third-footer {

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PRAYER_KEYS = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];

    function secondsToHMS(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
    }

    function getNextPrayer(times, timezone) {
      const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const nowParts = new Date().toLocaleTimeString("en-GB", {
        timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      }).split(":").map(Number);
      const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
      const prayers = PRAYER_KEYS.map(k => {
        const [h, m] = times[k].split(":").map(Number);
        return { name: k, secs: h * 3600 + m * 60, timeStr: times[k] };
      });
      const next = prayers.find(p => p.secs > nowSecs);
      const chosen = next || { name: "Fajr", timeStr: times["Fajr"], secs: null };
      let secsUntil;
      if (next) {
        secsUntil = next.secs - nowSecs;
      } else {
        const secsLeftToday = 86400 - nowSecs;
        const [fh, fm] = times["Fajr"].split(":").map(Number);
        secsUntil = secsLeftToday + fh * 3600 + fm * 60;
      }
      return { name: chosen.name, timeStr: chosen.timeStr, secsUntil };
    }

    const METHOD_INFO = {
      1:  { id: 1,  name: "Muslim World League",                       fajr: "18°",   isha: "17°"     },
      2:  { id: 2,  name: "Islamic Society of North America (ISNA)",   fajr: "15°",   isha: "15°"     },
      3:  { id: 3,  name: "Egyptian General Authority of Survey",       fajr: "19.5°", isha: "17.5°"   },
      4:  { id: 4,  name: "Umm al-Qura, Makkah",                       fajr: "18.5°", isha: "90 min"  },
      5:  { id: 5,  name: "University of Islamic Sciences, Karachi",   fajr: "18°",   isha: "18°"     },
      7:  { id: 7,  name: "Institute of Geophysics, Tehran",           fajr: "17.7°", isha: "14°"     },
      11: { id: 11, name: "Majlis Ugama Islam Singapura",              fajr: "20°",   isha: "18°"     },
      13: { id: 13, name: "Diyanet İşleri Başkanlığı, Turkey",         fajr: "18°",   isha: "17°"     },
      14: { id: 14, name: "Spiritual Administration of Muslims, Russia", fajr: "16°", isha: "15°"     },
      15: { id: 15, name: "Moonsighting Committee",                     fajr: "18°",   isha: "18°"     },
    };

    function getMethodForCountry(country) {
      if (!country) return 1;
      const c = country.toLowerCase();
      if (["united kingdom", "ireland"].some(x => c.includes(x))) return 15;
      if (["united states", "canada"].some(x => c.includes(x))) return 2;
      if (["saudi arabia", "united arab emirates", "kuwait", "qatar", "bahrain", "oman"].some(x => c.includes(x))) return 4;
      if (["egypt"].some(x => c.includes(x))) return 3;
      if (["pakistan", "india", "bangladesh", "afghanistan"].some(x => c.includes(x))) return 5;
      if (["malaysia", "singapore"].some(x => c.includes(x))) return 11;
      if (["iran"].some(x => c.includes(x))) return 7;
      if (["turkey"].some(x => c.includes(x))) return 13;
      if (["russia"].some(x => c.includes(x))) return 14;
      return 1;
    }

    function fetchWithTimeout(url, ms) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
    }

    async function fetchPrayerTimes(lat, lon, timezone, country, school, dayOffset) {
      const today = new Date();
      if (dayOffset) today.setDate(today.getDate() + dayOffset);
      const month = today.getMonth() + 1;
      const year = today.getFullYear();
      const day = today.getDate();
      const method = getMethodForCountry(country);
      const url = "https://api.aladhan.com/v1/calendar/" + year + "/" + month + "?latitude=" + lat + "&longitude=" + lon + "&method=" + method + "&school=" + (school || 0);
      const res = await fetchWithTimeout(url, 10000);
      const data = await res.json();
      if (!data || !data.data || !Array.isArray(data.data)) throw new Error("Unexpected response from prayer times service");
      const timings = data.data[day - 1] && data.data[day - 1].timings;
      if (!timings) throw new Error("Prayer times not available for this date");
      const clean = {};
      PRAYER_KEYS.forEach(k => { clean[k] = timings[k].split(" ")[0]; });
      return { times: clean, timezone: timezone, method };
    }

    async function searchPlaces(query) {
      const q = encodeURIComponent(query);
      const res = await fetchWithTimeout(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=8&language=en&format=json`, 8000);
      const data = await res.json();
      if (!data.results) return [];
      return data.results.map(r => {
        let country = r.country || "";
        if (!country && r.timezone && r.timezone.includes("Gaza")) country = "Palestinian Territories";
        if (!country && r.country_code === "PS") country = "Palestinian Territories";
        if (!country && r.latitude && r.longitude) {
          const lat = r.latitude, lon = r.longitude;
          if ((lat >= 31.2 && lat <= 31.6 && lon >= 34.2 && lon <= 34.6) ||
              (lat >= 31.3 && lat <= 32.6 && lon >= 34.9 && lon <= 35.6)) {
            country = "Palestinian Territories";
          }
        }
        if (country.toLowerCase().includes("somalia")) {
          const lat = r.latitude, lon = r.longitude;
          const somaliaCities = [
            "las anod", "laascaanood", "lasanod",          // Las Anod variants
            "taleh", "taleex",                              // Taleh variants
            "xudun", "hudun",                               // Xudun variants
            "kalabaydh",                                    // Kalabaydh
            "adhi addeye", "adhicadeeye", "adhi cadeeye",  // Adhi Addeye variants
            "yagoori", "yagori",                            // Yagoori variants
            "bohol",                                        // Bohol
            "buuhoodle", "buhodle"                          // Buuhoodle variants
          ];
          const cityLower = r.name ? r.name.toLowerCase() : "";
          if (lat >= 8 && lat <= 11.5 && lon >= 42.5 && lon <= 49.5 && !somaliaCities.includes(cityLower)) {
            country = "Somaliland";
          }
        }
        return {
          name: r.name,
          admin: r.admin1 || "",
          country,
          lat: r.latitude,
          lon: r.longitude,
          timezone: r.timezone || "",
        };
      });
    }

    function CitySearch({ onSelect }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [open, setOpen] = useState(false);
      const debounceRef = useRef(null);
      const wrapRef = useRef(null);

      useEffect(() => {
        function handleClick(e) {
          if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      function handleChange(e) {
        const val = e.target.value;
        setQuery(val);
        setResults([]);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        if (val.trim().length < 2) { setSearching(false); setOpen(false); return; }
        setSearching(true);
        setOpen(true);
        debounceRef.current = setTimeout(async () => {
          try {
            const places = await searchPlaces(val.trim());
            setResults(places);
          } catch {
            setResults([]);
          } finally {
            setSearching(false);
          }
        }, 320);
      }

      function handleSelect(place) {
        const label = [place.name, place.admin, place.country].filter(Boolean).join(", ");
        setQuery(label);
        setOpen(false);
        setResults([]);
        onSelect(place);
      }

      return (
        <div ref={wrapRef} style={{ position: "relative", width: "100%" }}>
          <input
            className="city-input"
            value={query}
            onChange={handleChange}
            onFocus={() => { if (results.length > 0) setOpen(true); }}
            placeholder="Type any city or town..."
            autoComplete="off"
            spellCheck={false}
            autoFocus
          />
          {searching && <p className="searching-hint">Searching_</p>}
          {open && !searching && query.trim().length >= 2 && results.length === 0 && (
            <ul className="suggestions">
              <li className="suggestion-item">
                <div className="suggestion-meta">No results — try a different spelling</div>
              </li>
            </ul>
          )}
          {open && results.length > 0 && (
            <ul className="suggestions">
              {results.map((r, i) => (
                <li key={i} className="suggestion-item" onMouseDown={() => handleSelect(r)}>
                  <div className="suggestion-city">{r.name}</div>
                  <div className="suggestion-meta">{[r.admin, r.country].filter(Boolean).join(", ")}</div>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    function App() {
      const [phase, setPhase] = useState("form");
      const [location, setLocation] = useState(null);
      const [prayerTimes, setPrayerTimes] = useState(null);
      const [nextPrayer, setNextPrayer] = useState(null);
      const [countdown, setCountdown] = useState("");
      const [errorMsg, setErrorMsg] = useState("");
      const [use24h, setUse24h] = useState(true);
      const [school, setSchool] = useState(0);
      const [themeOverride, setThemeOverride] = useState(null); // null = system, 'dark', 'light'
      const [lastThirdMode, setLastThirdMode] = useState(false);
      const [lastThirdData, setLastThirdData] = useState(null); // { inLastThird, secsUntil, message }

      // Apply theme override via data attribute — avoids overriding CSS variables
      useEffect(() => {
        if (themeOverride === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (themeOverride === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      }, [themeOverride]);

      function isDarkMode() {
        if (themeOverride === 'dark') return true;
        if (themeOverride === 'light') return false;
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      const [displayMode, setDisplayMode] = useState(false);
      const [displayDark, setDisplayDark] = useState(() => window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      const [adjustingJamaat, setAdjustingJamaat] = useState(false);

      const flashRef = useRef(null);
      const lastAlertedRef = useRef({ prayer: null, type: null });

      const [jamaatOffsets, setJamaatOffsets] = useState(() => {
        try {
          const saved = localStorage.getItem("jamaat-offsets");
          return saved ? JSON.parse(saved) : { Fajr: 0, Dhuhr: 0, Asr: 0, Isha: 0 };
        } catch { return { Fajr: 0, Dhuhr: 0, Asr: 0, Isha: 0 }; }
      });
      const [masjidName, setMasjidName] = useState(() => {
        try { return localStorage.getItem("masjid-name") || ""; } catch { return ""; }
      });
      const [showMasjidInput, setShowMasjidInput] = useState(false);
      const [masjidInputVal, setMasjidInputVal] = useState("");
      function enterDisplayMode() {
        if (masjidName) {
          setDisplayMode(true);
          document.body.classList.add("display-mode");
        } else {
          setMasjidInputVal("");
          setShowMasjidInput(true);
        }
      }

      function exitDisplayMode() {
        setDisplayMode(false);
        document.body.classList.remove("display-mode");
        // themeOverride is applied via data-theme attribute, no manual reset needed
      }

      function confirmMasjid() {
        const name = masjidInputVal.trim();
        if (!name) return;
        try { localStorage.setItem("masjid-name", name); } catch {}
        setMasjidName(name);
        setShowMasjidInput(false);
        setDisplayMode(true);
        document.body.classList.add("display-mode");
      }

      useEffect(() => {
        if (displayMode) {
          document.body.style.background = displayDark ? "#1a1a1a" : "#f5f0e8";
          document.body.style.color = displayDark ? "#f0ece4" : "#1a1a1a";
        } else {
          document.body.style.background = "";
          document.body.style.color = "";
        }
      }, [displayMode, displayDark]);

      async function loadPrayers(lat, lon, city, region, country, timezone, dayOffset) {
        setPhase("loading");
        try {
          const result = await fetchPrayerTimes(lat, lon, timezone, country, school, dayOffset);
          const resolvedTz = result.timezone || timezone;

          // If no dayOffset yet, check if Isha has passed — if so re-fetch tomorrow
          // Only do this if it's still the same calendar day (i.e. before midnight in the city's tz)
          if (!dayOffset) {
            const tz = resolvedTz || Intl.DateTimeFormat().resolvedOptions().timeZone;
            const nowParts = new Date().toLocaleTimeString("en-GB", {
              timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
            }).split(":").map(Number);
            const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
            const [ih, im] = result.times["Isha"].split(":").map(Number);
            const ishaSecs = ih * 3600 + im * 60;
            const [fh, fm] = result.times["Fajr"].split(":").map(Number);
            const fajrSecs = fh * 3600 + fm * 60;
            // Isha passed and we haven't crossed midnight yet (Fajr is still ahead in the future, not behind)
            if (nowSecs > ishaSecs && nowSecs > fajrSecs) {
              loadPrayers(lat, lon, city, region, country, timezone, 1);
              return;
            }
          }

          setPrayerTimes(result.times);
          setLocation({ city, region, country, timezone: resolvedTz, method: result.method, _lat: lat, _lon: lon });
          setNextPrayer(getNextPrayer(result.times, resolvedTz));
          setPhase("ready");
        } catch (err) {
          const msg = err && err.name === "AbortError"
            ? "Request timed out. Check your connection and try again."
            : "Could not load prayer times. Check your connection and try again.";
          setErrorMsg(msg);
          setPhase("error");
        }
      }

      useEffect(() => {
        if (!location) return;
        loadPrayers(location._lat, location._lon, location.city, location.region, location.country, location.timezone);
      }, [school]);

      useEffect(() => {
        if (phase !== "ready" || !prayerTimes || !location) return;
        const tz = location.timezone;
        const lat = location._lat;
        const lon = location._lon;
        const city = location.city;
        const region = location.region;
        const country = location.country;
        let lastDay = new Date().toLocaleDateString("en-CA", { timeZone: tz });

        const tick = () => {
          const currentDay = new Date().toLocaleDateString("en-CA", { timeZone: tz });
          if (currentDay !== lastDay) {
            lastDay = currentDay;
            loadPrayers(lat, lon, city, region, country, tz);
            return;
          }
          const np = getNextPrayer(prayerTimes, tz);
          setNextPrayer(np);
          setCountdown(secondsToHMS(np.secsUntil));
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [phase, prayerTimes, location]);

      // Flash alert for display mode — triggers at prayer start time and jamaat time
      useEffect(() => {
        if (!displayMode || !prayerTimes || !nextPrayer || !location) return;
        const tz = location.timezone;

        const checkFlash = () => {
          const nowParts = new Date().toLocaleTimeString("en-GB", {
            timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
          }).split(":").map(Number);
          const nowH = nowParts[0], nowM = nowParts[1], nowS = nowParts[2];

          PRAYER_KEYS.forEach(prayer => {
            const [ph, pm] = prayerTimes[prayer].split(":").map(Number);

            // Check start time alert — trigger within 3 second window to avoid missing exact second
            if (nowH === ph && nowM === pm && nowS <= 3) {
              const key = prayer + "-start";
              if (lastAlertedRef.current.key !== key) {
                lastAlertedRef.current.key = key;
                triggerFlash();
              }
            }

            // Check jamaat time alert (skip Maghrib)
            if (prayer !== "Maghrib") {
              const jamaatStr = getJamaatTime(prayer, prayerTimes[prayer], true);
              if (jamaatStr) {
                const [jh, jm] = jamaatStr.split(":").map(Number);
                if (nowH === jh && nowM === jm && nowS <= 3) {
                  const key = prayer + "-jamaat";
                  if (lastAlertedRef.current.key !== key) {
                    lastAlertedRef.current.key = key;
                    triggerFlash();
                  }
                }
              }
            }
          });
        };

        const id = setInterval(checkFlash, 1000);
        return () => clearInterval(id);
      }, [displayMode, prayerTimes, nextPrayer, location, jamaatOffsets]);

      function playAlertTone() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          [0, 0.45, 0.9].forEach(offset => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = "sine";
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.35, ctx.currentTime + offset);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.35);
            osc.start(ctx.currentTime + offset);
            osc.stop(ctx.currentTime + offset + 0.35);
          });
        } catch(e) {}
      }

      const savedDarkRef = useRef(displayDark);
      function triggerFlash() {
        playAlertTone();
        savedDarkRef.current = displayDark;
        if (flashRef.current) clearInterval(flashRef.current);

        let count = 0;
        flashRef.current = setInterval(() => {
          count++;
          setDisplayDark(d => !d);
          if (count >= 20) {
            clearInterval(flashRef.current);

            setDisplayDark(savedDarkRef.current);
          }
        }, 500);
      }

      async function handleCitySelect(place) {
        await loadPrayers(place.lat, place.lon, place.name, place.admin, place.country, place.timezone);
      }

      function getJamaatTime(prayerName, timeStr, use24h) {
        if (prayerName === "Maghrib") return null;
        const [h, m] = timeStr.split(":").map(Number);
        const totalMins = h * 60 + m + 25 + (jamaatOffsets[prayerName] || 0);
        const rounded = Math.round(totalMins / 5) * 5;
        const jh = Math.floor(rounded / 60) % 24;
        const jm = rounded % 60;
        if (use24h) {
          return String(jh).padStart(2, "0") + ":" + String(jm).padStart(2, "0");
        } else {
          const period = jh >= 12 ? "PM" : "AM";
          const h12 = jh % 12 || 12;
          return h12 + ":" + String(jm).padStart(2, "0") + " " + period;
        }
      }

      function adjustJamaat(prayer, delta) {
        setJamaatOffsets(prev => {
          const next = { ...prev, [prayer]: (prev[prayer] || 0) + delta };
          try { localStorage.setItem("jamaat-offsets", JSON.stringify(next)); } catch {}
          return next;
        });
      }

      function getDisplayCountdown(nextPrayer, prayerTimes, timezone, use24h) {
        if (!nextPrayer || !prayerTimes) return { label: "until athan", countdown: "" };
        const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
        const nowParts = new Date().toLocaleTimeString("en-GB", {
          timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
        }).split(":").map(Number);
        const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];

        const [ph, pm] = prayerTimes[nextPrayer.name].split(":").map(Number);
        const prayerSecs = ph * 3600 + pm * 60;

        // If we've passed the prayer start time and it's not Maghrib, check jamaat
        if (nowSecs >= prayerSecs && nextPrayer.name !== "Maghrib") {
          const jamaatStr = getJamaatTime(nextPrayer.name, prayerTimes[nextPrayer.name], true);
          if (jamaatStr) {
            const [jh, jm] = jamaatStr.split(":").map(Number);
            const jamaatSecs = jh * 3600 + jm * 60;
            if (nowSecs < jamaatSecs) {
              return { label: "until iqamah", countdown: secondsToHMS(jamaatSecs - nowSecs) };
            }
          }
        }

        return { label: "until athan", countdown: secondsToHMS(nextPrayer.secsUntil) };
      }

      function getLastThirdData(prayerTimes, timezone) {
        if (!prayerTimes || !timezone) return null;
        const tz = timezone;
        const nowParts = new Date().toLocaleTimeString("en-GB", {
          timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
        }).split(":").map(Number);
        const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];

        const [mh, mm] = prayerTimes["Maghrib"].split(":").map(Number);
        const [fh, fm] = prayerTimes["Fajr"].split(":").map(Number);
        const maghribSecs = mh * 3600 + mm * 60;
        // Fajr is next day so add 86400 if it's before Maghrib
        const fajrSecs = (fh * 3600 + fm * 60) + 86400;

        const nightDuration = fajrSecs - maghribSecs;
        const lastThirdStart = maghribSecs + Math.floor((2 / 3) * nightDuration);
        const lastThirdEnd = fajrSecs;

        // Normalise nowSecs — if before Maghrib we're in the previous night window
        let normNow = nowSecs;
        if (normNow < maghribSecs) normNow += 86400;

        const inLastThird = normNow >= lastThirdStart && normNow < lastThirdEnd;

        let secsUntil;
        if (inLastThird) {
          secsUntil = lastThirdEnd - normNow;
        } else if (normNow < lastThirdStart) {
          secsUntil = lastThirdStart - normNow;
        } else {
          // Past fajr, calculate for next night
          secsUntil = (86400 - normNow) + (lastThirdStart - maghribSecs);
        }

        return { inLastThird, secsUntil };
      }

      // Last third tick
      useEffect(() => {
        if (!lastThirdMode || !prayerTimes || !location) return;
        const tick = () => {
          const data = getLastThirdData(prayerTimes, location.timezone);
          setLastThirdData(data);
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [lastThirdMode, prayerTimes, location]);

      const formatTime = (prayer) => {
        if (!prayer) return "";
        const [h, m] = prayer.timeStr.split(":").map(Number);
        if (use24h) {
          return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
        } else {
          const period = h >= 12 ? "PM" : "AM";
          const h12 = h % 12 || 12;
          return h12 + ":" + String(m).padStart(2, "0") + " " + period;
        }
      };

      return (
        <>

        {/* Last Third Screen */}
        {lastThirdMode && phase === "ready" && prayerTimes && location && (
          <div
            className={"last-third-screen " + (lastThirdData && lastThirdData.inLastThird ? "in-third" : "not-in")}
            style={{
              background: lastThirdData && lastThirdData.inLastThird
                ? (isDarkMode() ? "#1a3d1a" : "#dff2df")
                : (isDarkMode() ? "#3d1a1a" : "#f2dfdf"),
              minHeight: "100vh",
              position: "fixed",
              top: 0, left: 0, right: 0, bottom: 0,
              zIndex: 100,
              display: "flex",
              flexDirection: "column",
              justifyContent: "center",
              padding: "2rem 1.5rem 5rem",
              maxWidth: "100%",
            }}
          >
            <p className="last-third-city">{location.city}{location.country ? ` — ${location.country}` : ""}</p>

            <div className="rule" style={{ marginBottom: "2rem", marginTop: 0, background: lastThirdData && lastThirdData.inLastThird ? "rgba(94,158,94,0.3)" : "rgba(196,94,94,0.3)" }} />

            {lastThirdData && lastThirdData.inLastThird ? (
              <>
                <div className="last-third-status" style={{ color: isDarkMode() ? "#8cc48e" : "#3d7a3d" }}>
                  It is the last third<br />of the night
                </div>
                <p className="last-third-label">ends in</p>
                <div className="last-third-countdown" style={{ color: isDarkMode() ? "#8cc48e" : "#3d7a3d" }}>
                  {secondsToHMS(lastThirdData.secsUntil)}
                </div>
                {(() => {
                  const tz = location.timezone;
                  const now = new Date();
                  const target = new Date(now.getTime() + lastThirdData.secsUntil * 1000);
                  const timeStr = target.toLocaleTimeString("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: !use24h });
                  return <p style={{ fontFamily: "Courier Prime, monospace", fontSize: "0.75rem", letterSpacing: "0.08em", textTransform: "uppercase", color: isDarkMode() ? "#8cc48e" : "#3d7a3d", opacity: 0.6, marginTop: "0.5rem" }}>ends at {timeStr}</p>;
                })()}
              </>
            ) : (
              <>
                <div className="last-third-status" style={{ color: isDarkMode() ? "#c48e8e" : "#b04040" }}>
                  Not yet the last<br />third of the night
                </div>
                <p className="last-third-label">begins in</p>
                <div className="last-third-countdown" style={{ color: isDarkMode() ? "#c48e8e" : "#b04040" }}>
                  {lastThirdData ? secondsToHMS(lastThirdData.secsUntil) : "—"}
                </div>
                {lastThirdData && (() => {
                  const tz = location.timezone;
                  const now = new Date();
                  const nowSecs = lastThirdData.secsUntil;
                  const target = new Date(now.getTime() + nowSecs * 1000);
                  const timeStr = target.toLocaleTimeString("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: !use24h });
                  return <p style={{ fontFamily: "Courier Prime, monospace", fontSize: "0.75rem", letterSpacing: "0.08em", textTransform: "uppercase", color: isDarkMode() ? "#c48e8e" : "#b04040", opacity: 0.6, marginTop: "0.5rem" }}>begins at {timeStr}</p>;
                })()}
              </>
            )}

            <div className="last-third-footer">
              <a href="https://sunnah.com/bukhari:7494" target="_blank" rel="noopener noreferrer" style={{ color: isDarkMode() ? "#f0ece4" : "#1a1a1a" }}>hadith</a>
              <button onClick={() => setLastThirdMode(false)} style={{ color: isDarkMode() ? "#f0ece4" : "#1a1a1a" }}>back</button>
            </div>
          </div>
        )}

        {/* Masjid name input overlay */}
        {showMasjidInput && (
          <div className="masjid-input-overlay">
            <div className="masjid-input-title">Display Mode</div>
            <p className="masjid-input-subtitle">Enter your masjid name</p>
            <input
              className="masjid-input"
              value={masjidInputVal}
              onChange={e => setMasjidInputVal(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") confirmMasjid(); }}
              placeholder="e.g. Sheffield Central Mosque"
              autoFocus
            />
            <button className="masjid-confirm-btn" onClick={confirmMasjid}>Confirm</button>
          </div>
        )}

        {/* Display mode view */}
        {displayMode && phase === "ready" && nextPrayer && prayerTimes && (
          <div className="shell">
            {/* Top right controls: AM/PM + Sun/moon */}
            <div style={{ position: "fixed", top: "1rem", right: "1rem", display: "flex", alignItems: "center", gap: "0.75rem", zIndex: 200 }}>
              <div
                onClick={() => setUse24h(p => !p)}
                style={{ cursor: "pointer", opacity: 0.5, fontFamily: "Courier Prime, monospace", fontSize: "0.6rem", letterSpacing: "0.1em", textTransform: "uppercase", color: displayDark ? "#f0ece4" : "#1a1a1a", padding: "0.5rem 0", minHeight: "44px", display: "flex", alignItems: "center", transition: "opacity 0.15s" }}
              >
                {use24h ? "am/pm" : "24h"}
              </div>
              <div className="display-mode-toggle" onClick={() => setDisplayDark(d => !d)} style={{ color: displayDark ? "#f0ece4" : "#1a1a1a", position: "static" }}>
              {displayDark ? (
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style={{ fill: "#f0ece4" }}><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
              ) : (
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style={{ fill: "#1a1a1a" }}><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-5a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm9-9h1a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2zM3 11h1a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2zm15.364-6.364.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zM6.343 17.657l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zm12.728 0-.707.707a1 1 0 0 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 1.414zM6.343 6.343l-.707.707A1 1 0 0 1 4.222 5.636l.707-.707a1 1 0 0 1 1.414 1.414z"/></svg>
              )}
              </div>
            </div>

            {masjidName && <div className="display-masjid">{masjidName}</div>}

            <p className="label">Next prayer</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 0, lineHeight: 1 }}>
              <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: "clamp(3rem, 12vw, 6rem)", letterSpacing: "0.04em", lineHeight: 1 }}>{nextPrayer.name}</div>
              <div style={{ fontSize: "clamp(1.8rem, 6vw, 3.5rem)", fontWeight: 700, letterSpacing: "0.05em", color: "var(--accent)", lineHeight: 1.1 }}>{formatTime(nextPrayer)}</div>
            </div>

            <div className="rule" style={{ margin: "1rem 0" }} />

            {(() => {
              const dc = getDisplayCountdown(nextPrayer, prayerTimes, location && location.timezone, use24h);
              return (
                <>
                  <p className="label">{dc.label}</p>
                  <div className="countdown" style={{ fontSize: "clamp(1.8rem, 6vw, 3.5rem)" }}>{dc.countdown || countdown}</div>
                </>
              );
            })()}

            <div className="rule" style={{ margin: "1rem 0" }} />

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", padding: "0 0 0.4rem", borderBottom: "1px solid " + (displayDark ? "rgba(240,236,228,0.15)" : "rgba(26,26,26,0.15)") }}>
              <span className="label" style={{ marginBottom: 0 }}>Prayer</span>
              <span className="label" style={{ textAlign: "center", marginBottom: 0 }}>Start</span>
              <span className="label" style={{ textAlign: "right", marginBottom: 0 }}>Jamaat</span>
            </div>

            <div className="display-prayers">
              {["Fajr","Dhuhr","Asr","Maghrib","Isha"].map(name => {
                const isActive = nextPrayer && nextPrayer.name === name;
                const jamaat = getJamaatTime(name, prayerTimes[name], use24h);
                const iconCol = displayDark ? "#f0ece4" : "#1a1a1a";
                return (
                  <div key={name} className={"display-prayer-row" + (isActive ? " active" : "")} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", alignItems: "center" }}>
                    <span>{name}</span>
                    <span style={{ textAlign: "center" }}>{formatTime({ timeStr: prayerTimes[name] })}</span>
                    <span style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: "0.4rem" }}>
                      {adjustingJamaat && jamaat && (
                        <button onClick={() => adjustJamaat(name, -5)} style={{ background: "transparent", border: "none", cursor: "pointer", color: iconCol, fontFamily: "Courier Prime, monospace", fontSize: "1.4rem", padding: "0.4rem 0.7rem", minHeight: "44px", opacity: 0.7 }}>−</button>
                      )}
                      <span style={{ opacity: jamaat ? 1 : 0.3 }}>{jamaat || "—"}</span>
                      {adjustingJamaat && jamaat && (
                        <button onClick={() => adjustJamaat(name, 5)} style={{ background: "transparent", border: "none", cursor: "pointer", color: iconCol, fontFamily: "Courier Prime, monospace", fontSize: "1.4rem", padding: "0.4rem 0.7rem", minHeight: "44px", opacity: 0.7 }}>+</button>
                      )}
                    </span>
                  </div>
                );
              })}
            </div>

            <div className="display-controls">
              <span className="display-control-btn" style={{ color: displayDark ? "#f0ece4" : "#1a1a1a", textDecoration: "none", opacity: 0.4, cursor: "default" }}>
                {location && location.city}{location && location.country ? ` — ${location.country}` : ""}
              </span>
              <button
                className="display-control-btn"
                style={{ color: displayDark ? "#f0ece4" : "#1a1a1a" }}
                onClick={() => { exitDisplayMode(); setPhase("form"); setPrayerTimes(null); setNextPrayer(null); setCountdown(""); setLocation(null); }}
              >
                change city
              </button>
              <button
                className="display-control-btn"
                style={{ color: displayDark ? "#f0ece4" : "#1a1a1a" }}
                onClick={() => { setMasjidInputVal(masjidName); setShowMasjidInput(true); setDisplayMode(false); document.body.classList.remove("display-mode"); }}
              >
                change masjid name
              </button>
              <button
                className="display-control-btn"
                style={{ color: displayDark ? "#f0ece4" : "#1a1a1a" }}
                onClick={() => setAdjustingJamaat(a => !a)}
              >
                {adjustingJamaat ? "done" : "adjust jamaat"}
              </button>
              {adjustingJamaat && (
                <button
                  className="display-control-btn"
                  style={{ color: displayDark ? "#f0ece4" : "#1a1a1a" }}
                  onClick={() => {
                    const reset = { Fajr: 0, Dhuhr: 0, Asr: 0, Isha: 0 };
                    setJamaatOffsets(reset);
                    try { localStorage.setItem("jamaat-offsets", JSON.stringify(reset)); } catch {}
                  }}
                >
                  reset jamaat
                </button>
              )}
              <button
                className="display-control-btn"
                style={{ color: displayDark ? "#f0ece4" : "#1a1a1a" }}
                onClick={exitDisplayMode}
              >
                exit display mode
              </button>
            </div>
          </div>
        )}

        {/* Theme toggle — top right, no box */}
        {!displayMode && (phase === "ready" || phase === "form") && (
          <button
            onClick={() => setThemeOverride(prev => {
              if (prev === null) return isDarkMode() ? 'light' : 'dark';
              if (prev === 'dark') return 'light';
              return 'dark';
            })}
            style={{ position: "fixed", top: "1rem", right: "1rem", background: "transparent", border: "none", cursor: "pointer", opacity: 0.3, transition: "opacity 0.15s", zIndex: 50, padding: "0.5rem", minHeight: "44px", minWidth: "44px", display: "flex", alignItems: "center", justifyContent: "center" }}
            onMouseEnter={e => e.currentTarget.style.opacity = 0.7}
            onMouseLeave={e => e.currentTarget.style.opacity = 0.3}
          >
            {(themeOverride === 'dark' || (themeOverride === null && isDarkMode())) ? (
              <svg viewBox="0 0 24 24" width="14" height="14" style={{ fill: "var(--fg)" }}><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-5a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm9-9h1a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2zM3 11h1a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2zm15.364-6.364.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zM6.343 17.657l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zm12.728 0-.707.707a1 1 0 0 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 1.414zM6.343 6.343l-.707.707A1 1 0 0 1 4.222 5.636l.707-.707a1 1 0 0 1 1.414 1.414z"/></svg>
            ) : (
              <svg viewBox="0 0 24 24" width="14" height="14" style={{ fill: "var(--fg)" }}><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
            )}
          </button>
        )}

        {/* Normal view */}
        {!displayMode && <div className="shell">

          {phase === "loading" && (
            <p className="loading-msg">Fetching prayer times_</p>
          )}

          {phase === "form" && (
            <div>
              <div className="form-title">Where are you?</div>
              <p className="form-subtitle">Enter your city to see your next prayer</p>
              <CitySearch key={location ? location.city : "empty"} onSelect={handleCitySelect} />
            </div>
          )}

          {phase === "ready" && nextPrayer && (
            <div>
              <p className="label">Next prayer</p>
              <div className="prayer-name">{nextPrayer.name}</div>
              <div className="prayer-time">{formatTime(nextPrayer)}</div>

              <div className="rule" />

              <p className="label">Time remaining</p>
              <div className="countdown">{countdown}</div>

              <div className="rule" style={{ margin: "1.5rem 0" }} />

              {prayerTimes && (
                <div className="all-prayers">
                  {["Fajr","Dhuhr","Asr","Maghrib","Isha"].map(name => (
                    <div key={name} className={"prayer-row" + (nextPrayer && nextPrayer.name === name ? " active" : "")}>
                      <span className="prayer-row-name">{name}</span>
                      <span className="prayer-row-time">{formatTime({ timeStr: prayerTimes[name] })}</span>
                    </div>
                  ))}
                </div>
              )}

              <div className="rule" />

              {location && (
                <p className="location-line">
                  <span>
                    {location.city}
                    {location.region && location.region !== location.city ? `, ${location.region}` : ""}
                    {location.country ? ` — ${location.country}` : ""}
                    {location.city && location.city.toLowerCase() === "garadag" && location.country && location.country.toLowerCase().includes("somalia") ? " (BIG UP!)" : ""}
                    {location.city && location.city.toLowerCase() === "hobyo" ? " (best beach town on earth!)" : ""}
                  </span>
                  <div className="location-controls">
                    <button className="change-btn" onClick={() => { setPhase("form"); setPrayerTimes(null); setNextPrayer(null); setCountdown(""); setLocation(null); }}>
                      change location
                    </button>
                    <button className="change-btn" onClick={() => setLastThirdMode(true)}>
                      last third
                    </button>
                    <div className="time-toggle" onClick={() => setUse24h(p => !p)}>
                      <div className="toggle-track">
                        <div className={"toggle-thumb" + (use24h ? "" : " right")} />
                      </div>
                      <span className="toggle-label">{use24h ? "am/pm" : "24h"}</span>
                    </div>
                  </div>
                </p>
              )}
            </div>
          )}

          {phase === "error" && (
            <div>
              <p className="error-msg">{errorMsg}</p>
              <button className="retry" onClick={() => { setPhase("form"); setErrorMsg(""); }}>
                Try again
              </button>
            </div>
          )}

        </div>}

        {location && location.method && METHOD_INFO[location.method] && (
          <p className="method-note">
            {METHOD_INFO[location.method].name} · Fajr {METHOD_INFO[location.method].fajr} · Isha {METHOD_INFO[location.method].isha}
            {" · "}
            <span
              onClick={() => setSchool(s => s === 0 ? 1 : 0)}
              style={{ cursor: "pointer", pointerEvents: "auto", textDecoration: "underline", textUnderlineOffset: "2px", opacity: 0.7 }}
            >
              {school === 0 ? "Shafi'i / Maliki / Hanbali" : "Hanafi"} Asr
            </span>
            {displayMode && (
              <>
                {" · "}
                <span
                  onClick={exitDisplayMode}
                  style={{ cursor: "pointer", pointerEvents: "auto", textDecoration: "underline", textUnderlineOffset: "2px", opacity: 0.7 }}
                >
                  <svg viewBox="0 0 24 24" width="9" height="9" style={{ fill: "var(--muted)", verticalAlign: "middle", marginRight: "0.25em", marginTop: "-1px" }}><path d="M21 2H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7v2H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-2v-2h7a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0 14H3V4h18v12z"/></svg>exit display mode
                </span>
              </>
            )}
            {!displayMode && phase === "ready" && (
              <>
                {" · "}
                <span
                  onClick={enterDisplayMode}
                  style={{ cursor: "pointer", pointerEvents: "auto", textDecoration: "underline", textUnderlineOffset: "2px", opacity: 0.7 }}
                >
                  <svg viewBox="0 0 24 24" width="9" height="9" style={{ fill: "var(--muted)", verticalAlign: "middle", marginRight: "0.25em", marginTop: "-1px" }}><path d="M21 2H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7v2H8a1 1 0 0 0 0 2h8a1 1 0 0 0 0-2h-2v-2h7a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm0 14H3V4h18v12z"/></svg>display mode
                </span>
              </>
            )}
          </p>
        )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script data-goatcounter="https://salaah.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
