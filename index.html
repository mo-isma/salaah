<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="salaah.co" />
  <meta property="og:description" content="Your next prayer, wherever you are" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="salaah.co" />
  <meta name="twitter:description" content="Your next prayer, wherever you are" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="salaah" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>salaah.co</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0e8;
      --fg: #1a1a1a;
      --accent: #5e8460;
      --border: #1a1a1a;
      --border-faint: rgba(26,26,26,0.15);
      --muted: #767676;
      --accent-faint: rgba(94,132,96,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #262624;
        --fg: #f0ece4;
        --accent: #8cc48e;
        --border: #f0ece4;
        --border-faint: rgba(240,236,228,0.15);
        --muted: #8a8a8a;
        --accent-faint: rgba(140,196,142,0.1);
      }
    }
    [data-theme="dark"] {
      --bg: #262624;
      --fg: #f0ece4;
      --accent: #8cc48e;
      --border: #f0ece4;
      --border-faint: rgba(240,236,228,0.15);
      --muted: #8a8a8a;
      --accent-faint: rgba(140,196,142,0.1);
      color-scheme: dark;
    }
    [data-theme="light"] {
      --bg: #f5f0e8;
      --fg: #1a1a1a;
      --accent: #5e8460;
      --border: #1a1a1a;
      --border-faint: rgba(26,26,26,0.15);
      --muted: #767676;
      --accent-faint: rgba(94,132,96,0.08);
      color-scheme: light;
    }
    [data-theme="dark"] body, [data-theme="light"] body {
      background: var(--bg);
      color: var(--fg);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Courier Prime', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #root { width: 100%; display: flex; justify-content: center; }
    .shell {
      width: 100%;
      max-width: 600px;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-bottom: 5rem;
    }
    .rule {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }
    .label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .prayer-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 7rem);
      line-height: 0.9;
      letter-spacing: 0.04em;
      color: var(--fg);
    }
    .prayer-time {
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--accent);
      font-weight: 700;
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }
    .countdown {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--accent);
      margin-top: 1rem;
    }
    .location-line {
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .location-controls {
      display: flex;
      align-items: center;
      column-gap: 1rem;
      row-gap: 0.2rem;
      flex-wrap: wrap;
    }
    .change-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.35rem 0;
      min-height: auto;
      display: inline-flex;
      align-items: center;
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .change-btn:hover { opacity: 1; }
    .time-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0.45;
      transition: opacity 0.15s;
      cursor: pointer;
      min-height: auto;
      padding: 0.35rem 0;
    }
    .time-toggle:hover { opacity: 0.85; }
    .toggle-track {
      width: 28px;
      height: 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      position: relative;
      background: transparent;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-thumb {
      width: 8px;
      height: 8px;
      background: var(--fg);
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    .toggle-thumb.right { transform: translateX(14px); }
    .toggle-label {
      font-family: "Courier Prime", monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      user-select: none;
      white-space: nowrap;
    }
    .toggle-label-fixed {
      width: 2.8rem;
      text-align: left;
    }
    .loading-msg {
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .form-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 3.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .form-subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .city-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--fg);
      font-family: 'Courier Prime', monospace;
      font-size: max(16px, clamp(1rem, 3vw, 1.25rem));
      padding: 0.5rem 2.5rem 0.5rem 0;
      outline: none;
      letter-spacing: 0.02em;
    }
    .city-input::placeholder { color: var(--muted); }
    .city-input:focus { caret-color: var(--accent); }
    .city-input-wrap {
      position: relative;
      width: 100%;
    }
    .gps-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      color: var(--muted);
      opacity: 0.45;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      min-width: 36px;
    }
    .gps-btn:hover:not(:disabled) { opacity: 1; }
    .gps-btn:disabled { cursor: default; }
    .gps-error {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.6;
      margin-top: 0.6rem;
    }
    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      list-style: none;
      margin: 0;
      padding: 0;
      z-index: 100;
      max-height: min(280px, 40vh);
      overflow-y: auto;
    }
    .suggestion-item {
      padding: 0.7rem 1rem;
      font-family: 'Courier Prime', monospace;
      font-size: 0.95rem;
      color: var(--fg);
      cursor: pointer;
      border-bottom: 1px solid var(--border-faint);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item:focus { background: var(--accent-faint); outline: none; }
    .suggestion-city { font-weight: 700; letter-spacing: 0.02em; }
    .suggestion-meta {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 0.15rem;
    }
    .searching-hint {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.6rem;
      animation: blink 1.2s step-end infinite;
    }
    .error-msg {
      font-size: 0.9rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      line-height: 1.6;
    }
    button.retry {
      margin-top: 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
    }
    button.retry:hover { background: var(--accent-faint); }
    .all-prayers {
      margin-top: 0;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .prayer-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: "Courier Prime", monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
    }
    .prayer-row.active { font-weight: 700; color: var(--accent); opacity: 1; }
    .prayer-row-name { font-weight: 400; }
    .prayer-row.active .prayer-row-name { font-weight: 700; }
    .prayer-row-time { font-weight: 400; }
    .prayer-row.active .prayer-row-time { font-weight: 700; }
    .method-note {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-family: "Courier Prime", monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      pointer-events: none;
      z-index: 10;
      padding: 1.2rem 1rem 0.5rem;
      padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
      white-space: normal;
      line-height: 1.6;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
      background: var(--bg);
    }
    @media (orientation: landscape) {
      .method-note {
        font-size: 0.5rem;
        line-height: 1.4;
        padding: 0.3rem 1rem;
        padding-bottom: calc(0.3rem + env(safe-area-inset-bottom));
      }
    }
    /* ─── Bookmark button ──────────────────────────────────────────────────── */
    .bookmark-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0 0.15rem;
      display: inline-flex;
      align-items: center;
      opacity: 0.5;
      transition: opacity 0.15s;
      vertical-align: middle;
      line-height: 1;
    }
    .bookmark-btn:hover { opacity: 1; }
    /* ─── Toast ────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--fg);
      color: var(--bg);
      font-family: 'Courier Prime', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      z-index: 300;
      pointer-events: none;
      white-space: nowrap;
      animation: toastAnim 2.8s ease forwards;
    }
    @keyframes toastAnim {
      0%   { opacity: 0; transform: translateX(-50%) translateY(4px); }
      10%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(0); }
    }
    /* ─── Phase fade ───────────────────────────────────────────────────────── */
    .phase-fade {
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* ─── Skip link & screen-reader helpers ────────────────────────────────── */
    .skip-link {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
      text-decoration: none;
    }
    .skip-link:focus {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: auto;
      height: auto;
      padding: 0.5rem 1rem;
      margin: 0;
      overflow: visible;
      clip: auto;
      white-space: normal;
      z-index: 9999;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
    /* ─── Last Third Mode ───────────────────────────────────────────────────── */
    .last-third-screen {
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: clamp(3rem, 12vmin, 6rem) 1.5rem 5rem;
    }
    .last-third-city {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .last-third-status {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 10vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0.04em;
      margin-bottom: 1rem;
    }
    .last-third-countdown {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      letter-spacing: 0.08em;
      line-height: 1;
      margin-top: 0.5rem;
    }
    .last-third-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
      margin-top: 1.5rem;
    }
    .last-third-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.75rem 1rem;
      padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
      font-family: "Courier Prime", monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }
    .last-third-footer a, .last-third-footer button {
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: "Courier Prime", monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 3px;
      opacity: 0.4;
      transition: opacity 0.15s;
      padding: 0.5rem 0;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }
    .last-third-footer a:hover, .last-third-footer button:hover { opacity: 0.8; }
    /* ─── Install screen ────────────────────────────────────────────────────── */
    .install-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      color: var(--fg);
      z-index: 150;
      overflow-y: auto;
      padding: clamp(3rem, 12vmin, 6rem) 1.5rem 5rem;
      display: flex;
      flex-direction: column;
    }
    .install-content {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }
    .install-step {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.2rem;
      align-items: flex-start;
    }
    .install-step-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--accent);
      line-height: 1.1;
      min-width: 1.2rem;
    }
    .install-step-text {
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      line-height: 1.7;
      color: var(--fg);
      padding-top: 0.15rem;
    }
  </style>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const PRAYER_KEYS = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];

    // ─── Device / context detection (stable, computed once) ────────────────
    const IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                      (navigator.maxTouchPoints > 1 && window.innerWidth <= 1024);
    const IS_STANDALONE = window.matchMedia('(display-mode: standalone)').matches ||
                          !!(navigator.standalone);
    const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const IS_ANDROID = /Android/i.test(navigator.userAgent);

    function secondsToHMS(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
    }

    function getNextPrayer(times, timezone) {
      const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const nowParts = new Date().toLocaleTimeString("en-GB", {
        timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      }).split(":").map(Number);
      const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
      const prayers = PRAYER_KEYS.map(k => {
        const [h, m] = times[k].split(":").map(Number);
        return { name: k, secs: h * 3600 + m * 60, timeStr: times[k] };
      });
      const next = prayers.find(p => p.secs > nowSecs);
      const chosen = next || { name: "Fajr", timeStr: times["Fajr"], secs: null };
      let secsUntil;
      if (next) {
        secsUntil = next.secs - nowSecs;
      } else {
        const secsLeftToday = 86400 - nowSecs;
        const [fh, fm] = times["Fajr"].split(":").map(Number);
        secsUntil = secsLeftToday + fh * 3600 + fm * 60;
      }
      return { name: chosen.name, timeStr: chosen.timeStr, secsUntil };
    }

    const METHOD_INFO = {
      1:  { id: 1,  name: "Muslim World League",                         fajr: "18°",   isha: "17°"    },
      2:  { id: 2,  name: "Islamic Society of North America (ISNA)",     fajr: "15°",   isha: "15°"    },
      3:  { id: 3,  name: "Egyptian General Authority of Survey",         fajr: "19.5°", isha: "17.5°"  },
      4:  { id: 4,  name: "Umm al-Qura, Makkah",                         fajr: "18.5°", isha: "90 min" },
      5:  { id: 5,  name: "University of Islamic Sciences, Karachi",     fajr: "18°",   isha: "18°"    },
      7:  { id: 7,  name: "Institute of Geophysics, Tehran",             fajr: "17.7°", isha: "14°"    },
      11: { id: 11, name: "Majlis Ugama Islam Singapura",                fajr: "20°",   isha: "18°"    },
      13: { id: 13, name: "Diyanet İşleri Başkanlığı, Turkey",           fajr: "18°",   isha: "17°"    },
      14: { id: 14, name: "Spiritual Administration of Muslims, Russia", fajr: "16°",   isha: "15°"    },
      15: { id: 15, name: "Moonsighting Committee",                       fajr: "18°",   isha: "18°"    },
    };

    function getMethodForCountry(country) {
      if (!country) return 1;
      const c = country.toLowerCase();
      if (["united kingdom", "ireland"].some(x => c.includes(x))) return 15;
      if (["united states", "canada"].some(x => c.includes(x))) return 2;
      if (["saudi arabia", "united arab emirates", "kuwait", "qatar", "bahrain", "oman"].some(x => c.includes(x))) return 4;
      if (["egypt"].some(x => c.includes(x))) return 3;
      if (["pakistan", "india", "bangladesh", "afghanistan"].some(x => c.includes(x))) return 5;
      if (["malaysia", "singapore"].some(x => c.includes(x))) return 11;
      if (["iran"].some(x => c.includes(x))) return 7;
      if (["turkey"].some(x => c.includes(x))) return 13;
      if (["russia"].some(x => c.includes(x))) return 14;
      return 1;
    }

    function fetchWithTimeout(url, ms) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(id));
    }

    async function fetchPrayerTimes(lat, lon, timezone, country, school, dayOffset) {
      const today = new Date();
      if (dayOffset) today.setDate(today.getDate() + dayOffset);
      const month = today.getMonth() + 1;
      const year = today.getFullYear();
      const day = today.getDate();
      const method = getMethodForCountry(country);
      const url = "https://api.aladhan.com/v1/calendar/" + year + "/" + month + "?latitude=" + lat + "&longitude=" + lon + "&method=" + method + "&school=" + (school || 0);
      const res = await fetchWithTimeout(url, 10000);
      const data = await res.json();
      if (!data || !data.data || !Array.isArray(data.data)) throw new Error("Unexpected response from prayer times service");
      const timings = data.data[day - 1] && data.data[day - 1].timings;
      if (!timings) throw new Error("Prayer times not available for this date");
      const clean = {};
      PRAYER_KEYS.forEach(k => { clean[k] = timings[k].split(" ")[0]; });
      return { times: clean, timezone: timezone, method };
    }

    // ─── Somaliland city list ────────────────────────────────────────────────
    const SOMALILAND_CITIES = new Set([
      "borama", "zeila", "lughaya", "baki", "berbera", "sheikh", "bulhar", "karin",
      "el-darad", "el darad", "mandera", "laba-yo", "laba yo",
      "hargeisa", "gabiley", "baligubadle", "madheera", "wajaale", "arabsiyo",
      "kalabaydh", "salahlay", "burao", "burco", "odweyne",
      "el afweyn", "el-afweyn", "ceel afweyn", "el afweyne",
      "haji salah", "yirowe", "fiqiayuub", "garadag", "xiis",
      "qorilugud", "qoryale", "widhwidh", "balidhiig",
      "erigavo", "ceerigaabo", "laasqoray", "lasqoray", "maduna",
    ]);

    async function searchPlaces(query) {
      const q = encodeURIComponent(query);
      const res = await fetchWithTimeout(`https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=8&language=en&format=json`, 8000);
      const data = await res.json();
      if (!data.results) return [];
      return data.results.map(r => {
        let country = r.country || "";
        if (!country && r.timezone && r.timezone.includes("Gaza")) country = "Palestinian Territories";
        if (!country && r.country_code === "PS") country = "Palestinian Territories";
        if (!country && r.latitude && r.longitude) {
          const lat = r.latitude, lon = r.longitude;
          if ((lat >= 31.2 && lat <= 31.6 && lon >= 34.2 && lon <= 34.6) ||
              (lat >= 31.3 && lat <= 32.6 && lon >= 34.9 && lon <= 35.6)) {
            country = "Palestinian Territories";
          }
        }
        if (country.toLowerCase().includes("somalia") || country.toLowerCase() === "somaliland") {
          const cityLower = r.name ? r.name.toLowerCase() : "";
          country = SOMALILAND_CITIES.has(cityLower) ? "Somaliland" : "Somalia";
        }
        return {
          name: r.name,
          admin: r.admin1 || "",
          country,
          lat: r.latitude,
          lon: r.longitude,
          timezone: r.timezone || "",
        };
      });
    }

    // ─── Reverse geocode GPS coords → place object ──────────────────────────
    async function reverseGeocode(lat, lon) {
      const res = await fetchWithTimeout(
        `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`,
        8000
      );
      const data = await res.json();
      let city = data.city || data.locality || data.principalSubdivision || data.countryName || "";
      let country = data.countryName || "";
      let region = data.principalSubdivision || "";
      let timezone = data.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      if (country.toLowerCase().includes("somalia") || country.toLowerCase() === "somaliland") {
        const cityLower = city.toLowerCase();
        country = SOMALILAND_CITIES.has(cityLower) ? "Somaliland" : "Somalia";
      }
      return { name: city, admin: region, country, lat, lon, timezone };
    }

    // ─── CitySearch component ────────────────────────────────────────────────
    function CitySearch({ onSelect }) {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [open, setOpen] = useState(false);
      const [gpsState, setGpsState] = useState(null); // null | "loading" | "denied" | "error"
      const debounceRef = useRef(null);
      const wrapRef = useRef(null);

      useEffect(() => {
        function handleClick(e) {
          if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      function handleChange(e) {
        const val = e.target.value;
        setQuery(val);
        setResults([]);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        if (val.trim().length < 2) { setSearching(false); setOpen(false); return; }
        setSearching(true);
        setOpen(true);
        debounceRef.current = setTimeout(async () => {
          try {
            const places = await searchPlaces(val.trim());
            setResults(places);
          } catch {
            setResults([]);
          } finally {
            setSearching(false);
          }
        }, 320);
      }

      function handleSelect(place) {
        const label = [place.name, place.admin, place.country].filter(Boolean).join(", ");
        setQuery(label);
        setOpen(false);
        setResults([]);
        onSelect(place);
      }

      async function handleGPS() {
        if (!navigator.geolocation) { setGpsState("error"); return; }
        setGpsState("loading");
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            try {
              const { latitude: lat, longitude: lon } = pos.coords;
              const rough = await reverseGeocode(lat, lon);
              let place = { ...rough };
              if (rough.name) {
                try {
                  const matches = await searchPlaces(rough.name);
                  if (matches.length > 0) {
                    place = {
                      name: matches[0].name,
                      admin: matches[0].admin,
                      country: matches[0].country,
                      timezone: matches[0].timezone || rough.timezone,
                      lat,
                      lon,
                    };
                  }
                } catch {}
              }
              const label = [place.name, place.admin, place.country].filter(Boolean).join(", ");
              setQuery(label);
              setGpsState(null);
              setTimeout(() => onSelect(place), 800);
            } catch {
              setGpsState("error");
            }
          },
          (err) => {
            setGpsState(err.code === 1 ? "denied" : "error");
          },
          { timeout: 10000, maximumAge: 60000 }
        );
      }

      return (
        <div ref={wrapRef} role="search" aria-label="Search for a city" style={{ position: "relative", width: "100%" }}>
          <div className="city-input-wrap">
            <input
              className="city-input"
              value={query}
              onChange={handleChange}
              onFocus={() => { if (results.length > 0) setOpen(true); }}
              placeholder="Type any city or town..."
              autoComplete="off"
              spellCheck={false}
              autoFocus
              aria-label="Search for a city or town"
            />
            <button
              className="gps-btn"
              onClick={handleGPS}
              aria-label="Detect my location"
              disabled={gpsState === "loading"}
            >
              {gpsState === "loading" ? (
                <svg viewBox="0 0 24 24" width="16" height="16" style={{ fill: "var(--muted)", animation: "blink 1.2s step-end infinite" }}>
                  <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2" fill="none" />
                  <circle cx="12" cy="12" r="3" fill="var(--muted)" />
                </svg>
              ) : (
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="var(--muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <polygon points="3 11 22 2 13 21 11 13 3 11" />
                </svg>
              )}
            </button>
          </div>
          {gpsState === "denied" && (
            <p className="gps-error">Enable location access in your browser settings to detect your city automatically</p>
          )}
          {gpsState === "error" && (
            <p className="gps-error">Could not detect your location. Try searching manually.</p>
          )}
          {searching && <p className="searching-hint">Searching_</p>}
          {open && !searching && query.trim().length >= 2 && results.length === 0 && (
            <ul className="suggestions" role="listbox" aria-label="Search results">
              <li className="suggestion-item" role="option" aria-selected="false">
                <div className="suggestion-meta">No results — try a different spelling</div>
              </li>
            </ul>
          )}
          {open && results.length > 0 && (
            <ul className="suggestions" role="listbox" aria-label="Search results">
              {results.map((r, i) => (
                <li
                  key={i}
                  className="suggestion-item"
                  role="option"
                  aria-selected="false"
                  onMouseDown={() => handleSelect(r)}
                  tabIndex={0}
                  onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleSelect(r); } }}
                >
                  <div className="suggestion-city">{r.name}</div>
                  <div className="suggestion-meta">{[r.admin, r.country].filter(Boolean).join(", ")}</div>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    // ─── Last third calculation ──────────────────────────────────────────────
    function getLastThirdData(maghribStr, fajrStr, timezone) {
      const tz = timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const nowParts = new Date().toLocaleTimeString("en-GB", {
        timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
      }).split(":").map(Number);
      const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
      const [mh, mm] = maghribStr.split(":").map(Number);
      const [fh, fm] = fajrStr.split(":").map(Number);
      const maghribSecs = mh * 3600 + mm * 60;
      const fajrSecs = (fh * 3600 + fm * 60) + 86400;
      const nightDuration = fajrSecs - maghribSecs;
      const lastThirdStart = maghribSecs + Math.floor((2 / 3) * nightDuration);
      let timelineNow = nowSecs;
      if (timelineNow < maghribSecs) timelineNow += 86400;
      const inLastThird = timelineNow >= lastThirdStart && timelineNow < fajrSecs;
      let secsUntil;
      if (inLastThird) {
        secsUntil = fajrSecs - timelineNow;
      } else if (timelineNow < lastThirdStart) {
        secsUntil = lastThirdStart - timelineNow;
      } else {
        secsUntil = (lastThirdStart + 86400) - timelineNow;
      }
      return { inLastThird, secsUntil };
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [phase, setPhase] = useState("form");
      const [location, setLocation] = useState(null);
      const [prayerTimes, setPrayerTimes] = useState(null);
      const [nextPrayer, setNextPrayer] = useState(null);
      const [countdown, setCountdown] = useState("");
      const [errorMsg, setErrorMsg] = useState("");
      const [use24h, setUse24h] = useState(true);
      const [school, setSchool] = useState(0);
      const [themeOverride, setThemeOverride] = useState(null);
      const [lastThirdMode, setLastThirdMode] = useState(false);
      const [lastThirdData, setLastThirdData] = useState(null);
      const [adjTimes, setAdjTimes] = useState(null);
      // New state
      const [homeCitySaved, setHomeCitySaved] = useState(false);
      const [toastKey, setToastKey] = useState(0);
      const [toastMsg, setToastMsg] = useState("");
      const [srWelcome, setSrWelcome] = useState(false);
      const toastTimerRef = useRef(null);

      // ─── Theme effect ──────────────────────────────────────────────────────
      useEffect(() => {
        if (themeOverride === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (themeOverride === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      }, [themeOverride]);

      function isDarkMode() {
        if (themeOverride === 'dark') return true;
        if (themeOverride === 'light') return false;
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      // ─── loadPrayers ───────────────────────────────────────────────────────
      async function loadPrayers(lat, lon, city, region, country, timezone, dayOffset) {
        setPhase("loading");
        try {
          const result = await fetchPrayerTimes(lat, lon, timezone, country, school, dayOffset);
          const resolvedTz = result.timezone || timezone;
          if (!dayOffset) {
            const tz = resolvedTz || Intl.DateTimeFormat().resolvedOptions().timeZone;
            const nowParts = new Date().toLocaleTimeString("en-GB", {
              timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
            }).split(":").map(Number);
            const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
            const [ih, im] = result.times["Isha"].split(":").map(Number);
            const ishaSecs = ih * 3600 + im * 60;
            const [fh, fm] = result.times["Fajr"].split(":").map(Number);
            const fajrSecs = fh * 3600 + fm * 60;
            if (nowSecs > ishaSecs && nowSecs > fajrSecs) {
              loadPrayers(lat, lon, city, region, country, timezone, 1);
              return;
            }
          }
          setPrayerTimes(result.times);
          setLocation({ city, region, country, timezone: resolvedTz, method: result.method, _lat: lat, _lon: lon });
          setNextPrayer(getNextPrayer(result.times, resolvedTz));
          setPhase("ready");
          document.title = "salaah.co \u2014 " + city;
        } catch (err) {
          document.title = "salaah.co";
          const msg = (err && err.name === "AbortError")
            ? "Request timed out. Check your connection and try again."
            : "Prayer times couldn't be loaded right now. Try again shortly.";
          setErrorMsg(msg);
          setPhase("error");
        }
      }

      // ─── Apply ampm logic for a country ───────────────────────────────────
      function applyAmPm(country) {
        const ampmCountries = ["united states", "philippines", "australia", "new zealand", "canada"];
        const c = (country || "").toLowerCase();
        if (ampmCountries.some(x => c.includes(x))) setUse24h(false);
        else setUse24h(true);
      }

      // ─── Load from saved city object ───────────────────────────────────────
      function startFromSaved(saved) {
        applyAmPm(saved.country);
        loadPrayers(saved.lat, saved.lon, saved.name, saved.admin, saved.country, saved.timezone);
      }

      // ─── On mount: SR welcome + restore saved city ─────────────────────────
      useEffect(() => {
        // Screen-reader one-time welcome
        if (!localStorage.getItem('sr-welcomed')) {
          localStorage.setItem('sr-welcomed', '1');
          setSrWelcome(true);
        }
        // Saved city
        const savedRaw = localStorage.getItem('salaah-home-city');
        if (savedRaw) {
          try {
            const saved = JSON.parse(savedRaw);
            startFromSaved(saved);
          } catch {
            localStorage.removeItem('salaah-home-city');
          }
        }
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      // ─── Re-load when school changes ───────────────────────────────────────
      useEffect(() => {
        if (!location) return;
        loadPrayers(location._lat, location._lon, location.city, location.region, location.country, location.timezone);
      }, [school]); // eslint-disable-line react-hooks/exhaustive-deps

      // ─── Countdown tick ────────────────────────────────────────────────────
      useEffect(() => {
        if (phase !== "ready" || !prayerTimes || !location) return;
        const tz = location.timezone;
        const lat = location._lat;
        const lon = location._lon;
        const city = location.city;
        const region = location.region;
        const country = location.country;
        let lastDay = new Date().toLocaleDateString("en-CA", { timeZone: tz });
        const tick = () => {
          const currentDay = new Date().toLocaleDateString("en-CA", { timeZone: tz });
          if (currentDay !== lastDay) {
            lastDay = currentDay;
            loadPrayers(lat, lon, city, region, country, tz);
            return;
          }
          const np = getNextPrayer(prayerTimes, tz);
          setNextPrayer(np);
          setCountdown(secondsToHMS(np.secsUntil));
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [phase, prayerTimes, location]); // eslint-disable-line react-hooks/exhaustive-deps

      // ─── Sync bookmark state when location changes ─────────────────────────
      useEffect(() => {
        if (!location) { setHomeCitySaved(false); return; }
        const savedRaw = localStorage.getItem('salaah-home-city');
        if (savedRaw) {
          try {
            const s = JSON.parse(savedRaw);
            setHomeCitySaved(
              Math.abs(s.lat - location._lat) < 0.01 &&
              Math.abs(s.lon - location._lon) < 0.01
            );
          } catch { setHomeCitySaved(false); }
        } else {
          setHomeCitySaved(false);
        }
      }, [location]);

      // ─── Toast helper ──────────────────────────────────────────────────────
      function fireToast(msg) {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToastMsg(msg);
        setToastKey(k => k + 1);
        toastTimerRef.current = setTimeout(() => setToastMsg(""), 2800);
      }

      // ─── Bookmark toggle ───────────────────────────────────────────────────
      function toggleBookmark() {
        if (homeCitySaved) {
          localStorage.removeItem('salaah-home-city');
          setHomeCitySaved(false);
          fireToast("Home city removed");
        } else {
          const place = {
            name: location.city,
            admin: location.region,
            country: location.country,
            lat: location._lat,
            lon: location._lon,
            timezone: location.timezone,
          };
          localStorage.setItem('salaah-home-city', JSON.stringify(place));
          setHomeCitySaved(true);
          fireToast("City locked as home");
          // Ask service worker to cache monthly prayer data
          if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            const today = new Date();
            const method = getMethodForCountry(location.country);
            const url = `https://api.aladhan.com/v1/calendar/${today.getFullYear()}/${today.getMonth() + 1}?latitude=${location._lat}&longitude=${location._lon}&method=${method}&school=0`;
            navigator.serviceWorker.controller.postMessage({ type: 'CACHE_URL', url });
          }
        }
      }

      // ─── City select ───────────────────────────────────────────────────────
      async function handleCitySelect(place) {
        applyAmPm(place.country);
        await loadPrayers(place.lat, place.lon, place.name, place.admin, place.country, place.timezone);
        window.scrollTo(0, 0);
      }

      // ─── Adjacent day for last third ───────────────────────────────────────
      useEffect(() => {
        if (!lastThirdMode || !prayerTimes || !location) { setAdjTimes(null); return; }
        let cancelled = false;
        const tz = location.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
        const nowParts = new Date().toLocaleTimeString("en-GB", {
          timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
        }).split(":").map(Number);
        const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
        const [fh, fm] = prayerTimes["Fajr"].split(":").map(Number);
        const fajrSecs = fh * 3600 + fm * 60;
        const offset = nowSecs < fajrSecs ? -1 : 1;
        fetchPrayerTimes(location._lat, location._lon, location.timezone, location.country, school, offset)
          .then(result => { if (!cancelled) setAdjTimes({ times: result.times, offset }); })
          .catch(() => { if (!cancelled) setAdjTimes(null); });
        return () => { cancelled = true; };
      }, [lastThirdMode, prayerTimes, location]); // eslint-disable-line react-hooks/exhaustive-deps

      // ─── Last third background ─────────────────────────────────────────────
      useEffect(() => {
        if (lastThirdMode && lastThirdData) {
          document.body.style.background = lastThirdData.inLastThird
            ? (isDarkMode() ? "#1a3d1a" : "#dff2df")
            : (isDarkMode() ? "#3d1a1a" : "#f2dfdf");
        } else if (!lastThirdMode) {
          document.body.style.background = "";
        }
      }, [lastThirdMode, lastThirdData, themeOverride]); // eslint-disable-line react-hooks/exhaustive-deps

      // ─── Last third tick ───────────────────────────────────────────────────
      useEffect(() => {
        if (!lastThirdMode || !prayerTimes || !location || !adjTimes) return;
        const tick = () => {
          const tz = location.timezone || Intl.DateTimeFormat().resolvedOptions().timeZone;
          const nowParts = new Date().toLocaleTimeString("en-GB", {
            timeZone: tz, hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
          }).split(":").map(Number);
          const nowSecs = nowParts[0] * 3600 + nowParts[1] * 60 + nowParts[2];
          const [fh, fm] = prayerTimes["Fajr"].split(":").map(Number);
          const fajrSecs = fh * 3600 + fm * 60;
          const maghribStr = nowSecs < fajrSecs ? adjTimes.times["Maghrib"] : prayerTimes["Maghrib"];
          const fajrStr    = nowSecs < fajrSecs ? prayerTimes["Fajr"]       : adjTimes.times["Fajr"];
          setLastThirdData(getLastThirdData(maghribStr, fajrStr, tz));
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => clearInterval(id);
      }, [lastThirdMode, prayerTimes, location, adjTimes]);

      // ─── Format time helper ────────────────────────────────────────────────
      const formatTime = (prayer) => {
        if (!prayer) return "";
        const [h, m] = prayer.timeStr.split(":").map(Number);
        if (use24h) {
          return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
        } else {
          const period = h >= 12 ? "PM" : "AM";
          const h12 = h % 12 || 12;
          return h12 + ":" + String(m).padStart(2, "0") + " " + period;
        }
      };

      // ─── Padlock SVG ───────────────────────────────────────────────────────
      const PadlockIcon = ({ locked }) => locked ? (
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, display: "block" }}>
          <rect x="3" y="11" width="18" height="11"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      ) : (
        <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="var(--muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, display: "block" }}>
          <rect x="3" y="11" width="18" height="11"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
      );

      // ─── Render ────────────────────────────────────────────────────────────
      return (
        <>
          {/* Screen-reader welcome (one-time, visually hidden) */}
          {srWelcome && (
            <div aria-live="assertive" aria-atomic="true" className="sr-only">
              Welcome to salaah.co. This app is fully accessible by screen reader. Use Tab to navigate and Enter to select.
            </div>
          )}

          {/* Toast */}
          {toastMsg && (
            <div key={toastKey} className="toast" role="status" aria-live="polite" aria-atomic="true">
              {toastMsg}
            </div>
          )}

          {/* Last Third Screen */}
          {lastThirdMode && phase === "ready" && prayerTimes && location && (
            <div
              className="last-third-screen"
              style={{
                background: lastThirdData && lastThirdData.inLastThird
                  ? (isDarkMode() ? "#1a3d1a" : "#dff2df")
                  : (isDarkMode() ? "#3d1a1a" : "#f2dfdf"),
                position: "fixed",
                top: 0, left: 0, right: 0, bottom: 0,
                zIndex: 100,
                overflowY: "auto",
              }}
            >
              <p className="last-third-city">{location.city}{location.country ? ` \u2014 ${location.country}` : ""}</p>
              <div className="rule" style={{ marginBottom: "2rem", marginTop: 0, background: lastThirdData && lastThirdData.inLastThird ? "rgba(94,158,94,0.3)" : "rgba(196,94,94,0.3)" }} />
              {!adjTimes ? (
                <p role="status" style={{ fontFamily: "Courier Prime, monospace", fontSize: "0.85rem", letterSpacing: "0.08em", textTransform: "uppercase", color: isDarkMode() ? "#8cc48e" : "#3d7a3d", opacity: 0.6, animation: "blink 1.2s step-end infinite" }}>Calculating...</p>
              ) : lastThirdData && lastThirdData.inLastThird ? (
                <div aria-live="polite" aria-atomic="true">
                  <div className="last-third-status" style={{ color: isDarkMode() ? "#8cc48e" : "#3d7a3d" }}>
                    It is the last third<br />of the night
                  </div>
                  <p className="last-third-label">ends in</p>
                  <div className="last-third-countdown" style={{ color: isDarkMode() ? "#8cc48e" : "#3d7a3d" }} aria-label={"Time remaining: " + secondsToHMS(lastThirdData.secsUntil)}>
                    {secondsToHMS(lastThirdData.secsUntil)}
                  </div>
                  {(() => {
                    const tz = location.timezone;
                    const now = new Date();
                    const target = new Date(now.getTime() + lastThirdData.secsUntil * 1000);
                    const timeStr = target.toLocaleTimeString("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: !use24h });
                    return <p style={{ fontFamily: "Courier Prime, monospace", fontSize: "0.75rem", letterSpacing: "0.08em", textTransform: "uppercase", color: isDarkMode() ? "#8cc48e" : "#3d7a3d", opacity: 0.6, marginTop: "0.5rem" }}>ends at {timeStr}</p>;
                  })()}
                </div>
              ) : (
                <div aria-live="polite" aria-atomic="true">
                  <div className="last-third-status" style={{ color: isDarkMode() ? "#c48e8e" : "#b04040" }}>
                    Not yet the last<br />third of the night
                  </div>
                  <p className="last-third-label">begins in</p>
                  <div className="last-third-countdown" style={{ color: isDarkMode() ? "#c48e8e" : "#b04040" }} aria-label={"Time remaining: " + (lastThirdData ? secondsToHMS(lastThirdData.secsUntil) : "")}>
                    {lastThirdData ? secondsToHMS(lastThirdData.secsUntil) : "\u2014"}
                  </div>
                  {lastThirdData && (() => {
                    const tz = location.timezone;
                    const now = new Date();
                    const target = new Date(now.getTime() + lastThirdData.secsUntil * 1000);
                    const timeStr = target.toLocaleTimeString("en-GB", { timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: !use24h });
                    return <p style={{ fontFamily: "Courier Prime, monospace", fontSize: "0.75rem", letterSpacing: "0.08em", textTransform: "uppercase", color: isDarkMode() ? "#c48e8e" : "#b04040", opacity: 0.6, marginTop: "0.5rem" }}>begins at {timeStr}</p>;
                  })()}
                </div>
              )}
              <div className="last-third-footer">
                <a href="https://sunnah.com/bukhari:7494" target="_blank" rel="noopener noreferrer" style={{ color: isDarkMode() ? "#f0ece4" : "#1a1a1a" }}>hadith</a>
                <button
                  onClick={toggleBookmark}
                  style={{ color: isDarkMode() ? "#f0ece4" : "#1a1a1a" }}
                  aria-label={homeCitySaved ? "Remove saved home city" : "Save as home city"}
                >
                  {homeCitySaved ? "unlock" : "lock city"}
                </button>
                <button onClick={() => setLastThirdMode(false)} style={{ color: isDarkMode() ? "#f0ece4" : "#1a1a1a" }}>back</button>
              </div>
            </div>
          )}

          {/* Install screen */}
          {phase === "install" && (
            <div className="install-screen phase-fade">
              <div className="install-content">
                <div className="form-title">Add to<br />home screen</div>
                <div className="rule" />
                {IS_IOS ? (
                  <>
                    <p className="label" style={{ marginBottom: "1.5rem" }}>On iPhone or iPad</p>
                    {[
                      ["1", "Open this page in Safari if you haven\u2019t already"],
                      ["2", "Tap the Share icon \u2014 the box with an arrow pointing up \u2014 at the bottom of the screen"],
                      ["3", "Scroll down and tap \u201cAdd to Home Screen\u201d"],
                      ["4", "Tap \u201cAdd\u201d in the top right corner"],
                    ].map(([num, text]) => (
                      <div key={num} className="install-step">
                        <span className="install-step-num">{num}</span>
                        <p className="install-step-text">{text}</p>
                      </div>
                    ))}
                  </>
                ) : IS_ANDROID ? (
                  <>
                    <p className="label" style={{ marginBottom: "1.5rem" }}>On Android</p>
                    {[
                      ["1", "Tap the menu icon \u2014 three dots in the top right corner of Chrome"],
                      ["2", "Tap \u201cAdd to Home screen\u201d"],
                      ["3", "Tap \u201cAdd\u201d to confirm"],
                    ].map(([num, text]) => (
                      <div key={num} className="install-step">
                        <span className="install-step-num">{num}</span>
                        <p className="install-step-text">{text}</p>
                      </div>
                    ))}
                  </>
                ) : (
                  <p style={{ fontSize: "0.85rem", letterSpacing: "0.03em", lineHeight: 1.7, color: "var(--fg)" }}>
                    To add salaah to your home screen, open this page in Safari (iPhone) or Chrome (Android)
                  </p>
                )}
              </div>
              <div className="last-third-footer">
                <button onClick={() => setPhase("ready")} style={{ color: "var(--fg)" }}>back</button>
              </div>
            </div>
          )}

          {/* Theme toggle */}
          {(phase === "ready" || phase === "form" || phase === "install") && (
            <button
              onClick={() => setThemeOverride(prev => {
                if (prev === null) return isDarkMode() ? 'light' : 'dark';
                if (prev === 'dark') return 'light';
                return 'dark';
              })}
              aria-label={isDarkMode() ? "Switch to light mode" : "Switch to dark mode"}
              style={{ position: "fixed", top: "1rem", right: "1rem", background: "transparent", border: "none", cursor: "pointer", opacity: 0.3, transition: "opacity 0.15s", zIndex: 50, padding: "0.5rem", minHeight: "44px", minWidth: "44px", display: "flex", alignItems: "center", justifyContent: "center" }}
              onMouseEnter={e => e.currentTarget.style.opacity = 0.7}
              onMouseLeave={e => e.currentTarget.style.opacity = 0.3}
            >
              {(themeOverride === 'dark' || (themeOverride === null && isDarkMode())) ? (
                <svg viewBox="0 0 24 24" width="14" height="14" style={{ fill: "var(--fg)" }}><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0-5a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 17a1 1 0 0 1 1 1v1a1 1 0 0 1-2 0v-1a1 1 0 0 1 1-1zm9-9h1a1 1 0 0 1 0 2h-1a1 1 0 0 1 0-2zM3 11h1a1 1 0 0 1 0 2H3a1 1 0 0 1 0-2zm15.364-6.364.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zM6.343 17.657l.707.707a1 1 0 0 1-1.414 1.414l-.707-.707a1 1 0 0 1 1.414-1.414zm12.728 0-.707.707a1 1 0 0 1-1.414-1.414l.707-.707a1 1 0 0 1 1.414 1.414zM6.343 6.343l-.707.707A1 1 0 0 1 4.222 5.636l.707-.707a1 1 0 0 1 1.414 1.414z"/></svg>
              ) : (
                <svg viewBox="0 0 24 24" width="14" height="14" style={{ fill: "var(--fg)" }}><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
              )}
            </button>
          )}

          {/* Main shell */}
          <div className="shell" id="main-content">
            {phase === "loading" && (
              <p role="status" className="loading-msg phase-fade">Fetching prayer times_</p>
            )}

            {phase === "form" && (
              <div className="phase-fade">
                <div className="form-title">Where are you?</div>
                <p className="form-subtitle">Enter your city to see your next prayer</p>
                <CitySearch key={location ? location.city : "empty"} onSelect={handleCitySelect} />
              </div>
            )}

            {phase === "ready" && nextPrayer && (
              <div className="phase-fade">
                <div aria-live="polite" aria-atomic="true">
                  <p className="label">Next prayer</p>
                  <div className="prayer-name">{nextPrayer.name}</div>
                  <div className="prayer-time">{formatTime(nextPrayer)}</div>
                  <div className="rule" />
                  <p className="label">Time remaining</p>
                  <div
                    className="countdown"
                    aria-label={"Time remaining: " + countdown}
                  >{countdown}</div>
                </div>
                <div className="rule" style={{ margin: "1.5rem 0" }} />
                {prayerTimes && (
                  <div className="all-prayers">
                    {["Fajr","Dhuhr","Asr","Maghrib","Isha"].map(name => (
                      <div key={name} className={"prayer-row" + (nextPrayer && nextPrayer.name === name ? " active" : "")}>
                        <span className="prayer-row-name">{name}</span>
                        <span className="prayer-row-time">{formatTime({ timeStr: prayerTimes[name] })}</span>
                      </div>
                    ))}
                  </div>
                )}
                <div className="rule" />
                {location && (
                  <p className="location-line">
                    <span style={{ display: "flex", alignItems: "center", gap: "0.4rem", flexWrap: "wrap" }}>
                      <span>
                        {location.city}
                        {location.region && location.region !== location.city ? `, ${location.region}` : ""}
                        {location.country ? ` \u2014 ${location.country}` : ""}
                        {location.city && location.city.toLowerCase() === "garadag" && location.country && location.country.toLowerCase() === "somaliland" ? " (BIG UP!)" : ""}
                        {location.city && location.city.toLowerCase() === "hobyo" ? " (best beach town on earth!)" : ""}
                      </span>
                      <button
                        className="bookmark-btn"
                        onClick={toggleBookmark}
                        aria-label={homeCitySaved ? "Remove saved home city" : "Save as home city"}
                      >
                        <PadlockIcon locked={homeCitySaved} />
                      </button>
                    </span>
                    <div className="location-controls">
                      <button
                        className="change-btn"
                        onClick={() => {
                          setPhase("form");
                          setPrayerTimes(null);
                          setNextPrayer(null);
                          setCountdown("");
                          setLocation(null);
                          document.title = "salaah.co";
                        }}
                      >
                        change location
                      </button>
                      <button
                        className="change-btn"
                        onClick={() => setLastThirdMode(true)}
                        aria-label="View last third of the night"
                      >
                        last third
                      </button>
                      {IS_MOBILE && !IS_STANDALONE && (
                        <button
                          className="change-btn"
                          onClick={() => setPhase("install")}
                          aria-label="Add salaah to your home screen"
                        >
                          add to home screen
                        </button>
                      )}
                      <div
                        className="time-toggle"
                        onClick={() => setUse24h(p => !p)}
                        role="switch"
                        aria-checked={use24h}
                        aria-label="Time format"
                        tabIndex={0}
                        onKeyDown={e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setUse24h(p => !p); } }}
                      >
                        <div className="toggle-track">
                          <div className={"toggle-thumb" + (use24h ? "" : " right")} />
                        </div>
                        <span className="toggle-label toggle-label-fixed">{use24h ? "24h" : "am/pm"}</span>
                      </div>
                    </div>
                  </p>
                )}
              </div>
            )}

            {phase === "error" && (
              <div role="status" className="phase-fade">
                <p className="error-msg">{errorMsg}</p>
                <button className="retry" onClick={() => { setPhase("form"); setErrorMsg(""); document.title = "salaah.co"; }}>
                  Try again
                </button>
              </div>
            )}
          </div>

          {location && location.method && METHOD_INFO[location.method] && (
            <p className="method-note">
              {METHOD_INFO[location.method].name} · Fajr {METHOD_INFO[location.method].fajr} · Isha {METHOD_INFO[location.method].isha}
              {" · "}
              <span
                onClick={() => setSchool(s => s === 0 ? 1 : 0)}
                style={{ cursor: "pointer", pointerEvents: "auto", textDecoration: "underline", textUnderlineOffset: "2px", opacity: 0.7 }}
              >
                {school === 0 ? "Shafi\u2019i / Maliki / Hanbali" : "Hanafi"} Asr
              </span>
            </p>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
  </script>
  <script data-goatcounter="https://salaah.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
